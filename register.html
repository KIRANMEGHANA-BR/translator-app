{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0 mt-4 auth-card">
            <div class="card-body p-4">
                <h3 class="text-center mb-4"><i class="fas fa-user-plus text-primary"></i> Create Account</h3>
                <form method="POST">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button class="btn btn-primary w-100 mt-3" type="submit">Sign Up</button>
                </form>
                <div class="text-center mt-3">
                    <small class="text-muted">Already have an account? <a href="{% url 'login' %}">Log In</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock content %}
